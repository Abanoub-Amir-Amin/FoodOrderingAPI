<div class="dashboard-root" [ngClass]="{'dark-mode': isDarkMode}">
      <mat-sidenav-container>

        <!-- Sidebar -->
        <mat-sidenav mode="side" opened fixedInViewport class="sidebar">
          <div class="brand">
            <img [src]="restaurant?.logoUrl || 'assets/default-restaurant.png'" class="logo" alt="logo" />
            <h2>Food Order App</h2>
            <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle dark mode">
              <mat-icon>{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</mat-icon>
            </button>

            <button mat-icon-button (click)="logout()" aria-label="Logout">
              <mat-icon>logout</mat-icon>
            </button>
          </div>

          <nav>
            <a mat-button routerLink="/dashboard" routerLinkActive="active" aria-label="Dashboard">
              <mat-icon>dashboard</mat-icon> Dashboard
            </a>
            <a mat-button routerLink="/orders-management" routerLinkActive="active" aria-label="Orders">
              <mat-icon>receipt_long</mat-icon> Orders
            </a>
            <a mat-button routerLink="/menu-management" routerLinkActive="active" aria-label="Menu">
              <mat-icon>restaurant_menu</mat-icon> Menu
            </a>
            <a mat-button routerLink="/dashboard-analytics" routerLinkActive="active" aria-label="Analytics">
              <mat-icon>bar_chart</mat-icon> Analytics
            </a>
            <a mat-button routerLink="/settings" routerLinkActive="active" aria-label="Settings">
              <mat-icon>settings</mat-icon> Settings
            </a>
            <a mat-button routerLink="/restaurant-profile" routerLinkActive="active" aria-label="Profile">
              <mat-icon>person</mat-icon> Profile
            </a>
          </nav>
        </mat-sidenav>

        <!-- Main Content -->
        <mat-sidenav-content>
          <mat-toolbar color="primary" class="toolbar">
            <span>{{ restaurant?.restaurantName }}</span>
            <span class="spacer"></span>

            <span *ngIf="restaurant?.isActive; else waiting">
              Account Status: <strong class="active">Active</strong>
            </span>
            <ng-template #waiting>
              Account Status: <strong class="pending">Pending Approval</strong>
            </ng-template>
          </mat-toolbar>

          <router-outlet></router-outlet>
        </mat-sidenav-content>

      </mat-sidenav-container>
    </div>
